<!DOCTYPE html>
<html>
<head>
    <title>Register | TradeMind AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{box-sizing:border-box;}
        body{
            margin:0;
            min-height:100vh;
            font-family:"Segoe UI", Arial, sans-serif;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            overflow:hidden;
            background:radial-gradient(circle at 20% 20%, #2563eb 0%, #0b1120 45%, #020617 100%);
            position:relative;
            color:#e2e8f0;
        }
        .blob{position:absolute;border-radius:50%;filter:blur(12px);opacity:.35;animation:float 12s ease-in-out infinite;}
        .b1{width:280px;height:280px;background:#60a5fa;top:-90px;left:-70px;}
        .b2{width:240px;height:240px;background:#a78bfa;bottom:-70px;right:-50px;animation-delay:2s;}
        .b3{width:180px;height:180px;background:#22d3ee;top:18%;right:8%;animation-delay:4s;}

        .card{
            width:100%;
            max-width:520px;
            background:linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
            border:1px solid rgba(148,163,184,.35);
            border-radius:22px;
            padding:24px;
            backdrop-filter:blur(14px) saturate(130%);
            -webkit-backdrop-filter:blur(14px) saturate(130%);
            box-shadow:0 18px 50px rgba(0,0,0,.5);
            position:relative;
            z-index:1;
            animation:fadeIn .7s ease;
        }
        h2{margin:0 0 6px;text-align:center;color:#f8fafc;font-size:28px;}
        .sub{margin:0 0 18px;text-align:center;color:#cbd5e1;font-size:14px;}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        label{display:block;margin-top:10px;font-size:13px;color:#e2e8f0;font-weight:600;}
        input{
            width:100%;
            margin-top:6px;
            padding:11px 12px;
            border-radius:10px;
            border:1px solid rgba(148,163,184,.45);
            background:rgba(15,23,42,.7);
            color:#e2e8f0;
            outline:none;
            transition:border-color .2s ease, box-shadow .2s ease;
        }
        input:focus{border-color:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.2);}
        .btn-primary{
            margin-top:16px;
            width:100%;
            border:none;
            border-radius:10px;
            padding:12px;
            background:linear-gradient(135deg,#6366f1,#4f46e5);
            color:#fff;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 10px 20px rgba(79,70,229,.35);
            transition:transform .2s ease;
        }
        .btn-primary:hover{transform:translateY(-2px);}
        .msg{margin-top:12px;padding:9px;border-radius:9px;font-size:13px;text-align:center;}
        .error{background:rgba(127,29,29,.35);border:1px solid rgba(248,113,113,.45);color:#fecaca;}
        .success{background:rgba(21,128,61,.28);border:1px solid rgba(74,222,128,.42);color:#bbf7d0;}
        .link{margin-top:14px;text-align:center;font-size:13px;color:#cbd5e1;}
        .link a{color:#a5b4fc;text-decoration:none;font-weight:600;}

        @keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
        @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}

        @media(max-width:560px){.grid{grid-template-columns:1fr;}.card{padding:20px;}h2{font-size:24px;}}
    </style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="card">
    <h2>📝 Register</h2>
    <p class="sub">Create your TradeMind AI account</p>

    <form method="POST">
        <div class="grid">
            <div>
                <label>Full Name</label>
                <input type="text" name="name" value="{{ form.name }}" required>
            </div>
            <div>
                <label>Age</label>
                <input type="number" name="age" value="{{ form.age }}" required>
            </div>
        </div>

        <label>Email ID</label>
        <input type="email" name="email" value="{{ form.email }}" required>

        <label>Mobile Number</label>
        <input type="tel" name="mobile" value="{{ form.mobile }}" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>

        <button type="submit" class="btn-primary">Create Account</button>

        {% if error %}
            <div class="msg error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="msg success">{{ success }}</div>
        {% endif %}
    </form>

    <div class="link">
        Already registered? <a href="/login">Login here</a>
    </div>
</div>

</body>
</html>
