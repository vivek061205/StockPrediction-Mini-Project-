<!DOCTYPE html>
<html>
<head>
    <title>Register | TradeMind AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{box-sizing:border-box;}
        body{
            margin:0;
            min-height:100vh;
            font-family:"Segoe UI", Arial, sans-serif;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:20px;
            overflow:hidden;
            background:radial-gradient(circle at 20% 20%, #2563eb 0%, #0b1120 45%, #020617 100%);
            position:relative;
            color:#e2e8f0;
        }
        .blob{position:absolute;border-radius:50%;filter:blur(12px);opacity:.35;animation:float 12s ease-in-out infinite;}
        .b1{width:280px;height:280px;background:#60a5fa;top:-90px;left:-70px;}
        .b2{width:240px;height:240px;background:#a78bfa;bottom:-70px;right:-50px;animation-delay:2s;}
        .b3{width:180px;height:180px;background:#22d3ee;top:18%;right:8%;animation-delay:4s;}

        .card{
            width:100%;
            max-width:520px;
            background:linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
            border:1px solid rgba(148,163,184,.35);
            border-radius:22px;
            padding:24px;
            backdrop-filter:blur(14px) saturate(130%);
            -webkit-backdrop-filter:blur(14px) saturate(130%);
            box-shadow:0 18px 50px rgba(0,0,0,.5);
            position:relative;
            overflow:hidden;
            z-index:1;
            animation:fadeIn .7s ease;
        }
        .card::before,
        .card::after{
            content:"";
            position:absolute;
            border-radius:50%;
            pointer-events:none;
        }
        .card::before{
            width:230px;
            height:230px;
            top:-130px;
            right:-55px;
            background:radial-gradient(circle, rgba(191,219,254,.35) 0%, rgba(191,219,254,0) 70%);
        }
        .card::after{
            width:200px;
            height:200px;
            bottom:-120px;
            left:-50px;
            background:radial-gradient(circle, rgba(196,181,253,.35) 0%, rgba(196,181,253,0) 70%);
        }
        h2{margin:0 0 6px;text-align:center;color:#f8fafc;font-size:28px;}
        .sub{margin:0 0 18px;text-align:center;color:#cbd5e1;font-size:14px;}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        label{display:block;margin-top:10px;font-size:13px;color:#e2e8f0;font-weight:600;}
        input{
            width:100%;
            margin-top:6px;
            padding:11px 12px;
            border-radius:10px;
            border:1px solid rgba(148,163,184,.45);
            background:rgba(15,23,42,.7);
            color:#e2e8f0;
            outline:none;
            transition:border-color .2s ease, box-shadow .2s ease;
        }
        input:focus{border-color:#6366f1;box-shadow:0 0 0 4px rgba(99,102,241,.2);}
        .btn-primary{
            margin-top:16px;
            width:100%;
            border:none;
            border-radius:10px;
            padding:12px;
            background:linear-gradient(135deg,#6366f1,#4f46e5);
            color:#fff;
            font-weight:600;
            cursor:pointer;
            box-shadow:0 10px 20px rgba(79,70,229,.35);
            transition:transform .2s ease;
        }
        .btn-primary:hover{transform:translateY(-2px);}

        .divider{
            position:relative;
            margin-top:12px;
            text-align:center;
        }
        .divider::before{
            content:"";
            position:absolute;
            left:0;
            right:0;
            top:50%;
            height:1px;
            background:linear-gradient(90deg, transparent, rgba(148,163,184,.55), transparent);
        }
        .divider span{
            position:relative;
            display:inline-block;
            padding:0 10px;
            font-size:12px;
            color:#cbd5e1;
            background:rgba(17,24,39,.45);
            border-radius:999px;
        }

        .btn-google{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            width:100%;
            margin-top:10px;
            text-decoration:none;
            border-radius:10px;
            padding:11px 12px;
            font-size:14px;
            font-weight:600;
            color:#111827;
            border:1px solid #e5e7eb;
            background:rgba(255,255,255,.94);
            transition:transform .2s ease, box-shadow .2s ease, background-color .2s ease;
        }
        .btn-google:hover{transform:translateY(-2px);box-shadow:0 8px 18px rgba(2,6,23,.28);background:#fff;}
        .btn-google svg{width:18px;height:18px;display:block;}
        .msg{margin-top:12px;padding:9px;border-radius:9px;font-size:13px;text-align:center;}
        .error{background:rgba(127,29,29,.35);border:1px solid rgba(248,113,113,.45);color:#fecaca;}
        .success{background:rgba(21,128,61,.28);border:1px solid rgba(74,222,128,.42);color:#bbf7d0;}
        .link{margin-top:14px;text-align:center;font-size:13px;color:#cbd5e1;}
        .link a{color:#a5b4fc;text-decoration:none;font-weight:600;}

        @keyframes fadeIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
        @keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-18px);}}

        @media(max-width:560px){.grid{grid-template-columns:1fr;}.card{padding:20px;}h2{font-size:24px;}}
    </style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div class="card">
    <h2>Register</h2>
    <p class="sub">Create your TradeMind AI account</p>

    <form method="POST">
        <div class="grid">
            <div>
                <label>Full Name</label>
                <input type="text" name="name" value="{{ form.name }}" required>
            </div>
            <div>
                <label>Age</label>
                <input type="number" name="age" value="{{ form.age }}" required>
            </div>
        </div>

        <label>Email ID</label>
        <input type="email" name="email" value="{{ form.email }}" required>

        <label>Mobile Number</label>
        <input type="tel" name="mobile" value="{{ form.mobile }}" required>

        <label>Password</label>
        <input type="password" name="password" required>

        <label>Confirm Password</label>
        <input type="password" name="confirm_password" required>

        <button type="submit" class="btn-primary">Create Account</button>
        <div class="divider"><span>or</span></div>
        <a href="/auth/google" class="btn-google" aria-label="Continue with Google">
            <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.2-.9 2.2-1.9 3l3 2.3c1.7-1.6 2.7-4 2.7-6.8 0-.6-.1-1.2-.2-1.8H12z"/>
                <path fill="#34A853" d="M12 22c2.4 0 4.4-.8 5.8-2.1l-3-2.3c-.8.6-1.8 1-2.9 1-2.2 0-4.1-1.5-4.8-3.5l-3.1 2.4C5.4 20.2 8.5 22 12 22z"/>
                <path fill="#4A90E2" d="M7.2 15.1c-.2-.6-.4-1.2-.4-1.9 0-.7.1-1.3.4-1.9L4.1 8.9C3.4 10.2 3 11.6 3 13.2s.4 3 1.1 4.3l3.1-2.4z"/>
                <path fill="#FBBC05" d="M12 7.7c1.3 0 2.5.5 3.4 1.3l2.6-2.6C16.4 4.9 14.4 4 12 4 8.5 4 5.4 5.8 4.1 8.9l3.1 2.4c.7-2.1 2.6-3.6 4.8-3.6z"/>
            </svg>
            Continue with Google
        </a>

        {% if error %}
            <div class="msg error">{{ error }}</div>
        {% endif %}

        {% if success %}
            <div class="msg success">{{ success }}</div>
        {% endif %}
    </form>

    <div class="link">
        Already registered? <a href="/login">Login here</a>
    </div>
</div>

</body>
</html>
